<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        * { font-weight: bold !important; font-family: sans-serif; }
        body { background: #f4f4f9; padding: 10px; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #3498db; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 5px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body onload="checkLoginState()">

    <div id="loginPage" class="card">
        <h2>Log Masuk Ahli</h2>
        <input type="email" id="loginEmail" placeholder="Emel">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        <button class="btn" onclick="loginMember()">MASUK</button>
        <button class="btn" style="background:#e67e22;" onclick="lupaPassword()">LUPA KATA LALUAN?</button>
    </div>

    <div id="mainContent" class="page">
        <div id="profil" class="card">
            <h2>👤 Profil Ahli</h2>
            <div id="viewProfil">
                <p>Nama: <span id="vNama">-</span></p>
                <p>Alamat: <span id="vAlamat">-</span></p>
                <p>No Tel: <span id="vTel">-</span></p>
                <p>Waris: <span id="vWaris">-</span></p>
                <p>Tanggungan: <span id="vTanggungan">-</span></p>
                <button class="btn" onclick="bukaEdit()">KEMASKINI</button>
            </div>
            
            <div id="editProfil" style="display:none;">
                <input type="text" id="eAlamat" placeholder="Alamat">
                <input type="text" id="eTel" placeholder="No Tel">
                <input type="text" id="eWaris" placeholder="Nama Waris">
                <select id="eHubunganWaris">
                    <option value="Isteri">Isteri</option><option value="Suami">Suami</option><option value="Anak">Anak</option>
                </select>
                <input type="text" id="eTelWaris" placeholder="No Tel Waris">
                <div id="inputTanggungan">
                    <script>
                        for(let i=1; i<=5; i++) {
                            document.write(`Nama ${i}: <input type="text" class="tNama" id="tNama${i}">`);
                            document.write(`Lahir ${i}: <input type="date" class="tLahir" id="tLahir${i}"><br>`);
                        }
                    </script>
                </div>
                <button class="btn" style="background:#27ae60" onclick="saveProfile()">SIMPAN</button>
                <button class="btn" style="background:#7f8c8d" onclick="bukaEdit()">BATAL</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC_YDZfbKqgZjOBuz722XrSwOw7JPJx0u4", authDomain: "khairatsmarttempat.firebaseapp.com", projectId: "khairatsmarttempat", storageBucket: "khairatsmarttempat.firebasestorage.app", messagingSenderId: "356017221628", appId: "1:356017221628:web:e9a56a3fa6dd0079904c79" };
        firebase.initializeApp(firebaseConfig);

        function checkLoginState() {
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    loadData(user.uid);
                }
            });
        }

        function loadData(uid) {
            firebase.database().ref('ahli/' + uid).on('value', (s) => {
                let d = s.val() || {};
                document.getElementById('vNama').innerText = d.nama || '-';
                document.getElementById('vAlamat').innerText = d.alamat || '-';
                document.getElementById('vTel').innerText = d.tel || '-';
                document.getElementById('vWaris').innerText = (d.waris || '-') + " (" + (d.hubunganWaris || "-") + ")";
                document.getElementById('vTanggungan').innerText = d.tanggunganRaw || '-';
                
                document.getElementById('eAlamat').value = d.alamat || '';
                document.getElementById('eTel').value = d.tel || '';
                document.getElementById('eWaris').value = d.waris || '';
            });
        }

        function saveProfile() {
            let uid = firebase.auth().currentUser.uid;
            let dataT = "";
            for(let i=1; i<=5; i++) {
                let n = document.getElementById('tNama'+i).value;
                let l = document.getElementById('tLahir'+i).value;
                if(n) dataT += n + " (" + l + "), ";
            }
            
            // Menggunakan .once() untuk mendapatkan data semasa sebelum update
            firebase.database().ref('ahli/' + uid).once('value', (snapshot) => {
                let currentData = snapshot.val() || {};
                let newData = {
                    nama: currentData.nama || 'Tiada Nama',
                    alamat: document.getElementById('eAlamat').value,
                    tel: document.getElementById('eTel').value,
                    waris: document.getElementById('eWaris').value,
                    hubunganWaris: document.getElementById('eHubunganWaris').value,
                    telWaris: document.getElementById('eTelWaris').value,
                    tanggunganRaw: dataT
                };
                
                firebase.database().ref('ahli/' + uid).set(newData)
                .then(() => { alert("Berjaya Disimpan!"); bukaEdit(); });
            });
        }

        function bukaEdit() {
            let v = document.getElementById('viewProfil');
            let e = document.getElementById('editProfil');
            v.style.display = (v.style.display === 'none') ? 'block' : 'none';
            e.style.display = (e.style.display === 'none') ? 'block' : 'none';
        }

        function lupaPassword() {
            let email = document.getElementById('loginEmail').value;
            if(!email) { alert("Masukkan emel dulu!"); return; }
            firebase.auth().sendPasswordResetEmail(email).then(() => alert("Pautan dihantar!")).catch(e => alert(e.message));
        }

        function loginMember() { firebase.auth().signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(e => alert(e.message)); }
    </script>
</body>
</html>
