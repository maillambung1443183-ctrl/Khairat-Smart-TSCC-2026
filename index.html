<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>
    <h2>Uji Sambungan Database</h2>
    <input type="text" id="idTest" placeholder="Masukkan ID (cth: KAF045)">
    <button onclick="testMasuk()">MASUK</button>
    <p id="hasil"></p>

    <script>
        // Gunakan konfigurasi yang anda baru beri
        const firebaseConfig = {
            databaseURL: "https://khairat-smart-al-falah-tscc-default-rtdb.firebaseio.com",
            projectId: "khairat-smart-al-falah-tscc"
        };
        firebase.initializeApp(firebaseConfig);

        function testMasuk() {
            let id = document.getElementById('idTest').value;
            // Terus rujuk ID tanpa folder 'ahli/'
            firebase.database().ref(id).once('value', (s) => {
                if(s.exists()) {
                    document.getElementById('hasil').innerHTML = "<b>BERJAYA!</b> Data dijumpai:<br>" + JSON.stringify(s.val());
                } else {
                    document.getElementById('hasil').innerText = "Gagal: ID " + id + " tidak dijumpai dalam database ini.";
                }
            }).catch(e => {
                document.getElementById('hasil').innerText = "Ralat: " + e.message;
            });
        }
    </script>
</body>
</html>
