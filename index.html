<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; max-width: 400px; margin: auto; }
        .page { display: none; }
        .active { display: block; }
        .btn { background: #3498db; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; }
        input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="loginPage" class="card active">
        <h2>🔒 Log Masuk</h2>
        <input type="email" id="loginEmail" placeholder="Emel">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        <button class="btn" onclick="loginUser()">MASUK</button>
        <p style="text-align:center; cursor:pointer; color:blue;" onclick="showPage('lupaPage')">Lupa Kata Laluan?</p>
    </div>

    <div id="lupaPage" class="card page">
        <h2>🔄 Reset Kata Laluan</h2>
        <input type="email" id="emailLupa" placeholder="Masukkan emel anda">
        <button class="btn" style="background:#e74c3c" onclick="lupaKataLaluan()">Hantar Pautan</button>
        <p style="text-align:center; cursor:pointer;" onclick="showPage('loginPage')">Kembali ke Log Masuk</p>
    </div>

    <div id="mainContent" class="page">
        <div class="card">
            <button onclick="showPage('info')">Info</button>
            <button onclick="showPage('daftar')">Daftar</button>
            <button onclick="location.reload()" style="background:#7f8c8d">Log Keluar</button>
        </div>

        <div id="info" class="card page active">
            <h2>✨ Manfaat Khairat</h2>
            <p><strong>RM 750:</strong> Pengurusan Jenazah</p>
            <p><strong>RM 250:</strong> Bantuan Tunai</p>
            <p><strong>Bayaran:</strong> 9988000930222 (Surau Al Falah TSCC)</p>
        </div>

        <div id="daftar" class="card page">
            <h2>📝 Pendaftaran Baru</h2>
            <input type="text" id="dNama" placeholder="Nama Penuh">
            <input type="text" id="dAlamat" placeholder="Alamat">
            <input type="text" id="dTel" placeholder="No Telefon">
            <input type="text" id="dWaris" placeholder="Waris Utama">
            <input type="text" id="dTanggungan" placeholder="Tanggungan (5 orang)">
            <button class="btn" style="background:#27ae60" onclick="registerData()">Daftar Sekarang</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAD_xdF9IDyWoFoPFuQZv7TcOM71m-7zbA",
            authDomain: "khairat-smart-al-falah-tscc.firebaseapp.com",
            databaseURL: "https://khairat-smart-al-falah-tscc-default-rtdb.firebaseio.com",
            projectId: "khairat-smart-al-falah-tscc",
            storageBucket: "khairat-smart-al-falah-tscc.firebasestorage.app",
            messagingSenderId: "90984659311",
            appId: "1:90984659311:web:f82d82b83b59609c6b509a",
            measurementId: "G-YZSE1KBQHD"
        };
        firebase.initializeApp(firebaseConfig);

        function showPage(id) {
            document.querySelectorAll('.card').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function loginUser() {
            let email = document.getElementById('loginEmail').value;
            let pass = document.getElementById('loginPass').value;
            firebase.auth().signInWithEmailAndPassword(email, pass)
            .then(() => {
                document.getElementById('loginPage').classList.remove('active');
                document.getElementById('mainContent').classList.add('active');
            })
            .catch(e => alert("Ralat Login: " + e.message));
        }

        function lupaKataLaluan() {
            let email = document.getElementById('emailLupa').value;
            firebase.auth().sendPasswordResetEmail(email)
            .then(() => alert("Pautan reset telah dihantar ke emel anda."))
            .catch(e => alert("Ralat: " + e.message));
        }

        function registerData() {
            let nama = document.getElementById('dNama').value;
            firebase.database().ref('ahli/' + nama).set({
                alamat: document.getElementById('dAlamat').value,
                tel: document.getElementById('dTel').value,
                waris: document.getElementById('dWaris').value,
                tanggungan: document.getElementById('dTanggungan').value
            }).then(() => alert("Berjaya!"));
        }
    </script>
</body>
</html>
