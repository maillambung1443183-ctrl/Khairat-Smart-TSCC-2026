<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .page { display: none; }
        .active { display: block; }
        .btn { background: #3498db; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        input, textarea { width: 95%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- Login Page -->
    <div id="loginPage" class="card active">
        <h2>🔒 Log Masuk</h2>
        <input type="email" id="loginEmail" placeholder="Emel">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        <button class="btn" onclick="loginUser()">MASUK</button>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="page">
        <nav style="margin-bottom: 20px;">
            <button onclick="showPage('info')">Info</button>
            <button onclick="showPage('profil')">Profil Ahli</button>
            <button onclick="showPage('daftar')">Daftar</button>
        </nav>

        <div id="info" class="page active card">
            <h2>✨ Manfaat Khairat</h2>
            <p><strong>RM 750:</strong> Pengurusan Jenazah</p>
            <p><strong>RM 250:</strong> Bantuan Tunai</p>
            <p><strong>Bank:</strong> 9988000930222 (Surau Al Falah TSCC)</p>
            <h3>👥 Barisan AJK</h3>
            <p>Pengerusi: En Awang (0133333333)<br>Setiausaha: En Ismail (0177000242)<br>Bendahari: En Mohd Zan (0111111111)</p>
        </div>

        <div id="profil" class="page card">
            <h2>👤 Kemaskini Profil</h2>
            <input type="text" id="pAlamat" placeholder="Alamat Penuh">
            <input type="text" id="pTel" placeholder="No Telefon">
            <input type="text" id="pTanggungan" placeholder="Tanggungan (5 orang)">
            <input type="text" id="pWaris" placeholder="Waris Utama">
            <button class="btn" style="background:#27ae60" onclick="updateProfil()">Simpan Kemaskini</button>
        </div>

        <div id="daftar" class="page card">
            <h2>📝 Pendaftaran Baru</h2>
            <input type="text" id="dNama" placeholder="Nama Penuh">
            <input type="text" id="dAlamat" placeholder="Alamat">
            <input type="text" id="dTel" placeholder="No Telefon">
            <input type="email" id="dEmail" placeholder="Email">
            <input type="text" id="dWaris" placeholder="Waris Utama">
            <input type="text" id="dTanggungan" placeholder="Tanggungan (5 orang)">
            <button class="btn" style="background:#e67e22" onclick="registerData()">Daftar Sekarang</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* (Gunakan config anda di sini) */ };
        firebase.initializeApp(firebaseConfig);

        function loginUser() { /* (Fungsi login sedia ada) */ }
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        
        function registerData() {
            let data = {
                nama: document.getElementById('dNama').value,
                alamat: document.getElementById('dAlamat').value,
                tel: document.getElementById('dTel').value,
                email: document.getElementById('dEmail').value,
                waris: document.getElementById('dWaris').value,
                tanggungan: document.getElementById('dTanggungan').value
            };
            firebase.database().ref('ahli/' + data.nama).set(data)
            .then(() => alert("Berjaya Daftar! Sila buat bayaran ke akaun 9988000930222"));
        }

        function updateProfil() { /* Fungsi .update() ke Firebase */ }
    </script>
</body>
</html>
