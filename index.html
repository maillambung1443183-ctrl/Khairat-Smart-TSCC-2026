<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Khairat Smart TSCC - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Tab System */
        .page { display: none; }
        .active-page { display: block; }
        
        .tab-menu { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; cursor: pointer; background: #ddd; border: none; border-radius: 5px; }
        .tab-btn.active-tab { background: #3498db; color: white; }

        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body onload="checkLoginState()">

<!-- LOGIN PAGE -->
<div id="authPage" class="page active-page">
    <div class="card">
        <h2 id="formTitle">Log Masuk</h2>
        <input type="email" id="email" placeholder="Emel">
        <input type="password" id="pass" placeholder="Kata Laluan">
        <button onclick="login()" style="background:#27ae60; color:white;">LOG MASUK</button>
    </div>
</div>

<!-- DASHBOARD (Tabbed) -->
<div id="mainPage" class="page">
    <div class="tab-menu">
        <button class="tab-btn active-tab" onclick="openTab(event, 'tab1')">Info</button>
        <button class="tab-btn" onclick="openTab(event, 'tab2')">Profil</button>
        <button class="tab-btn" onclick="logout()" style="background:#e74c3c; color:white;">Keluar</button>
    </div>

    <div id="tab1" class="card tab-content active-page">
        <h3>Info Khairat</h3>
        <p>Maklumat manfaat khairat dan pengurusan jenazah akan dipaparkan di sini.</p>
    </div>

    <div id="tab2" class="card tab-content page">
        <h3>Profil & Tanggungan</h3>
        <div id="profilData">Memuatkan data...</div>
        <hr>
        <div id="tanggunganFields"></div>
        <button onclick="saveProfile()" style="background:#27ae60; color:white;">SIMPAN PROFIL</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC_YDZfbKqgZjOBuz722XrSwOw7JPJx0u4",
        authDomain: "khairatsmarttempat.firebaseapp.com",
        projectId: "khairatsmarttempat",
        storageBucket: "khairatsmarttempat.firebasestorage.app",
        messagingSenderId: "356017221628",
        appId: "1:356017221628:web:e9a56a3fa6dd0079904c79"
    };
    firebase.initializeApp(firebaseConfig);

    // Jana input 5 tanggungan
    let tFields = "";
    for(let i=1; i<=5; i++) {
        tFields += `<div><input type="text" id="nama${i}" placeholder="Nama Tanggungan ${i}"></div>`;
    }
    document.getElementById('tanggunganFields').innerHTML = tFields;

    function openTab(evt, tabName) {
        let i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active-tab");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active-tab");
    }

    function checkLoginState() {
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authPage').classList.remove('active-page');
                document.getElementById('mainPage').classList.add('active-page');
                loadData(user.uid);
            }
        });
    }

    function loadData(uid) {
        firebase.database().ref('ahli/'+uid).on('value', s => {
            let d = s.val() || {};
            document.getElementById('profilData').innerHTML = `Nama: ${d.nama||'Sila kemaskini nama'}`;
        });
    }

    function saveProfile() {
        let uid = firebase.auth().currentUser.uid;
        let data = {};
        for(let i=1; i<=5; i++) { data['nama'+i] = document.getElementById('nama'+i).value; }
        firebase.database().ref('ahli/'+uid).update(data).then(() => alert("Data disimpan!"));
    }

    function login() {
        firebase.auth().signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value)
        .catch(e => alert(e.message));
    }
    
    function logout() { firebase.auth().signOut().then(() => location.reload()); }
</script>
</body>
</html>
