<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Khairat Smart</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; cursor: pointer; }
        .tab { display: flex; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="tab">
        <button onclick="tukarView('login')">Log Masuk</button>
        <button onclick="tukarView('daftar')">Daftar</button>
    </div>

    <div id="loginView">
        <h3>Log Masuk</h3>
        <input type="text" id="inId" placeholder="Masukkan ID Ahli">
        <button onclick="logMasuk()">MASUK</button>
    </div>

    <div id="daftarView" style="display:none;">
        <h3>Daftar Ahli</h3>
        <input type="text" id="newId" placeholder="ID Ahli (cth: KAF000)">
        <input type="text" id="newName" placeholder="Nama Penuh">
        <input type="text" id="newAlamat" placeholder="Alamat">
        <button onclick="daftarAhli()" style="background:#27ae60">DAFTAR SEKARANG</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://khairatsmarttempat-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);

    function tukarView(view) {
        document.getElementById('loginView').style.display = view === 'login' ? 'block' : 'none';
        document.getElementById('daftarView').style.display = view === 'daftar' ? 'block' : 'none';
    }

    // FUNGSI DAFTAR (Simpan data baru ke Firebase)
    function daftarAhli() {
        let id = document.getElementById('newId').value;
        let nama = document.getElementById('newName').value;
        let alamat = document.getElementById('newAlamat').value;

        if(id && nama) {
            // Kita guna .push() untuk cipta 'Key Unik' automatik dalam folder 'ahli'
            firebase.database().ref('ahli').push({
                id: id,
                nama: nama,
                alamat: alamat
            }).then(() => {
                alert("Pendaftaran Berjaya!");
                location.reload();
            });
        } else {
            alert("Sila isi ID dan Nama!");
        }
    }

    // FUNGSI LOG MASUK (Seperti kod sebelum ini)
    function logMasuk() {
        let idDicari = document.getElementById('inId').value;
        firebase.database().ref('ahli').orderByChild('id').equalTo(idDicari).once('value', (s) => {
            if(s.exists()) {
                alert("Log Masuk Berjaya!");
                // Boleh sambung ke paparan profil di sini
            } else {
                alert("ID tidak ditemui!");
            }
        });
    }
</script>
</body>
</html>
