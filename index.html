<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { background: #3498db; color: white; padding: 12px; border: none; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; }
        .page { display: none; } .active { display: block; }
        .tanggungan-box { border: 1px solid #ddd; padding: 10px; margin: 5px 0; border-radius: 8px; background: #f9f9f9; }
    </style>
</head>
<body onload="checkLoginState()">

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="card">
        <h2>Log Masuk</h2>
        <input type="email" id="loginEmail" placeholder="Emel">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        <button class="btn" onclick="loginMember()">MASUK</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="mainContent" class="page">
        <div id="profil" class="card">
            <h2>👤 Profil Ahli</h2>
            <p><b>Alamat:</b> <span id="vAlamat">-</span></p>
            <p><b>No. Tel:</b> <span id="vTel">-</span></p>
            <p><b>Alamat Waris:</b> <span id="vWarisAlamat">-</span></p>
            <p><b>Tanggungan:</b><br><span id="vTanggunganList">-</span></p>
            
            <button class="btn" style="background:#f39c12" onclick="toggleEdit()">KEMASKINI PROFIL</button>
            
            <div id="editForm" style="display:none; margin-top:20px; border-top:1px solid #ccc; padding-top:10px;">
                <h3>Kemaskini Maklumat</h3>
                <input type="text" id="editAlamat" placeholder="Alamat Baru">
                <input type="text" id="editTel" placeholder="No. Tel Baru">
                <input type="text" id="editWarisAlamat" placeholder="Alamat Waris Baru">
                
                <h4>Senarai 5 Tanggungan</h4>
                <div id="tanggunganInputs">
                    <!-- Script akan jana 5 set input di sini -->
                </div>
                <button class="btn" style="background:#27ae60" onclick="updateProfile()">SIMPAN SEMUA</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* Sila masukkan semula config anda di sini */ };
        firebase.initializeApp(firebaseConfig);

        // Jana 5 kotak input tanggungan secara automatik
        let html = "";
        for(let i=1; i<=5; i++) {
            html += `<div class="tanggungan-box">
                <input type="text" id="tNama${i}" placeholder="Nama Tanggungan ${i}">
                <input type="date" id="tLahir${i}" onchange="kiraUmur(${i})">
                <p>Umur: <span id="tUmur${i}">0</span> tahun</p>
            </div>`;
        }
        document.getElementById('tanggunganInputs').innerHTML = html;

        function checkLoginState() {
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    firebase.database().ref('ahli/' + user.uid).once('value', (s) => {
                        let d = s.val() || {};
                        document.getElementById('vAlamat').innerText = d.alamat || "-";
                        document.getElementById('vTel').innerText = d.tel || "-";
                        document.getElementById('vWarisAlamat').innerText = d.warisAlamat || "-";
                        
                        let list = "";
                        for(let i=1; i<=5; i++) {
                            if(d['tNama'+i]) list += `${i}. ${d['tNama'+i]} (${d['tUmur'+i]} thn)<br>`;
                        }
                        document.getElementById('vTanggunganList').innerHTML = list || "-";
                    });
                }
            });
        }

        function kiraUmur(i) {
            let lahir = new Date(document.getElementById('tLahir'+i).value);
            let umur = new Date().getFullYear() - lahir.getFullYear();
            document.getElementById('tUmur'+i).innerText = umur;
        }

        function toggleEdit() {
            let form = document.getElementById('editForm');
            form.style.display = (form.style.display === 'none') ? 'block' : 'none';
        }

        function updateProfile() {
            let uid = firebase.auth().currentUser.uid;
            let data = {
                alamat: document.getElementById('editAlamat').value,
                tel: document.getElementById('editTel').value,
                warisAlamat: document.getElementById('editWarisAlamat').value
            };
            for(let i=1; i<=5; i++) {
                data['tNama'+i] = document.getElementById('tNama'+i).value;
                data['tUmur'+i] = document.getElementById('tUmur'+i).innerText;
            }
            firebase.database().ref('ahli/' + uid).update(data).then(() => {
                alert("Profil dikemaskini!");
                location.reload();
            });
        }

        function loginMember() {
            firebase.auth().signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(e => alert(e.message));
        }
    </script>
</body>
</html>
