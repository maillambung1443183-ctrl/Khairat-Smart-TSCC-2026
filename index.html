<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; font-family: sans-serif; background: #f4f4f9; }
        .card { background: white; padding: 15px; margin: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #3498db; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .page { display: none; }
        .active { display: block; }
        .nav-container { display: flex; gap: 5px; padding: 20px 10px 10px 10px; }
        .tab-btn { background: #3498db; padding: 10px; color: white; border: none; border-radius: 5px; cursor: pointer; flex: 1; }
    </style>
</head>
<body onload="checkLoginState()">

    <div id="loginPage" class="card">
        <h2>Log Masuk Ahli</h2>
        <input type="text" id="loginID" placeholder="ID Ahli (Contoh: KAF045)">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        <button class="btn" onclick="loginMember()">MASUK</button>
    </div>

    <div id="mainContent" class="page">
        <nav class="nav-container">
            <button class="tab-btn" onclick="showPage('info')">Info</button>
            <button class="tab-btn" onclick="showPage('profil')">Profil</button>
            <button class="tab-btn" style="background:#e74c3c" onclick="location.reload()">Keluar</button>
        </nav>

        <div id="info" class="card page active">
            <h2>📋 Info Khairat</h2>
            <p>Jumlah Manfaat: RM1000</p>
        </div>

        <div id="profil" class="card page">
            <h2>👤 Profil Ahli</h2>
            <div id="viewProfil">
                <p><b>Nama:</b> <span id="vNama">-</span></p>
                <p><b>No Ahli:</b> <span id="vNoAhli">-</span></p>
                <p><b>Alamat:</b> <span id="vAlamat">-</span></p>
                <p><b>No Tel:</b> <span id="vTel">-</span></p>
                <p><b>Waris:</b> <span id="vWaris">-</span></p>
                <p><b>Tanggungan:</b> <span id="vTanggungan">-</span></p>
                <button class="btn" onclick="toggleEdit()">KEMASKINI</button>
            </div>
            <div id="editProfil" style="display:none;">
                <input type="text" id="eAlamat" placeholder="Alamat Baru">
                <input type="text" id="eTel" placeholder="No Tel Baru">
                <input type="text" id="eWaris" placeholder="Tambah Nama Waris">
                <input type="text" id="eTanggungan" placeholder="Tambah Nama Tanggungan">
                <button class="btn" style="background:#27ae60" onclick="saveProfile()">SIMPAN</button>
                <button class="btn" style="background:#7f8c8d" onclick="toggleEdit()">BATAL</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://khairat-smart-al-falah-tscc-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        let currentID = "";

        function loginMember() {
            currentID = document.getElementById('loginID').value;
            firebase.database().ref(currentID).once('value', (s) => {
                if(s.exists()) {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    loadData();
                } else { alert("ID tidak dijumpai!"); }
            });
        }

        function loadData() {
            firebase.database().ref(currentID).on('value', (s) => {
                let d = s.val();
                document.getElementById('vNama').innerText = d.nama || '-';
                document.getElementById('vNoAhli').innerText = currentID;
                document.getElementById('vAlamat').innerText = d.alamat || '-';
                document.getElementById('vTel').innerText = d.tel || '-';
                document.getElementById('vWaris').innerText = d.waris || '-';
                document.getElementById('vTanggungan').innerText = d.tanggungan || '-';
            });
        }

        function toggleEdit() {
            let v = document.getElementById('viewProfil');
            let e = document.getElementById('editProfil');
            v.style.display = (v.style.display === 'none') ? 'block' : 'none';
            e.style.display = (e.style.display === 'none') ? 'block' : 'none';
        }

        function saveProfile() {
            firebase.database().ref(currentID).once('value', (s) => {
                let d = s.val();
                let updateData = {};
                
                if(document.getElementById('eAlamat').value) updateData.alamat = document.getElementById('eAlamat').value;
                if(document.getElementById('eTel').value) updateData.tel = document.getElementById('eTel').value;
                
                // Menambah data baru ke data lama (append)
                if(document.getElementById('eWaris').value) {
                    updateData.waris = d.waris ? d.waris + ", " + document.getElementById('eWaris').value : document.getElementById('eWaris').value;
                }
                if(document.getElementById('eTanggungan').value) {
                    updateData.tanggungan = d.tanggungan ? d.tanggungan + ", " + document.getElementById('eTanggungan').value : document.getElementById('eTanggungan').value;
                }

                firebase.database().ref(currentID).update(updateData).then(() => { alert("Berjaya dikemaskini!"); toggleEdit(); });
            });
        }

        function showPage(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }
    </script>
</body>
</html>
