<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
</head>
<body>

    <h2>Log Masuk</h2>
    <input type="email" id="loginEmail" placeholder="Emel"><br>
    <input type="password" id="loginPass" placeholder="Kata Laluan"><br>
    <button onclick="loginUser()">Log Masuk</button>

    <hr>

    <h2>Pendaftaran ID Ahli</h2>
    <input type="text" id="inputID" placeholder="ID (Contoh: KAF001)"><br>
    <input type="email" id="inputEmail" placeholder="Emel"><br>
    <button onclick="registerData()">Daftar Data</button>

    <hr>

    <h2>Lupa Kata Laluan?</h2>
    <input type="email" id="emailLupa" placeholder="Masukkan emel anda"><br>
    <button onclick="lupaKataLaluan()">Reset Kata Laluan</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAD_xdF9IDyWoFoPFuQZv7TcOM71m-7zbA",
            authDomain: "khairat-smart-al-falah-tscc.firebaseapp.com",
            databaseURL: "https://khairat-smart-al-falah-tscc-default-rtdb.firebaseio.com",
            projectId: "khairat-smart-al-falah-tscc",
            storageBucket: "khairat-smart-al-falah-tscc.firebasestorage.app",
            messagingSenderId: "90984659311",
            appId: "1:90984659311:web:f82d82b83b59609c6b509a",
            measurementId: "G-YZSE1KBQHD"
        };
        firebase.initializeApp(firebaseConfig);

        // Fungsi Log Masuk
        function loginUser() {
            let email = document.getElementById("loginEmail").value;
            let pass = document.getElementById("loginPass").value;
            firebase.auth().signInWithEmailAndPassword(email, pass)
            .then(() => { alert("Log masuk berjaya!"); })
            .catch((error) => { alert("Ralat: " + error.message); });
        }

        // Fungsi Pendaftaran Data
        function registerData() {
            let idAhli = document.getElementById("inputID").value.trim();
            let emailUser = document.getElementById("inputEmail").value.trim();
            firebase.database().ref('ahli/' + idAhli).update({ email: emailUser })
            .then(() => { alert("Data berjaya disimpan!"); })
            .catch((error) => { alert("Ralat: " + error.message); });
        }

        // Fungsi Reset Kata Laluan
        function lupaKataLaluan() {
            let email = document.getElementById("emailLupa").value.trim();
            firebase.auth().sendPasswordResetEmail(email)
            .then(() => { alert("Pautan reset telah dihantar ke emel anda."); })
            .catch((error) => { alert("Ralat: " + error.message); });
        }
    </script>
</body>
</html>
