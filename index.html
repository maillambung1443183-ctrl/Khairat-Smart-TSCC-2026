<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .page { display: none; } .active { display: block; }
        .btn { background: #2c3e50; color: white; padding: 12px; border: none; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 90%; padding: 14px; margin: 10px 0; border: 2px solid #ddd; border-radius: 12px; }
        h2 { color: #2c3e50; text-align: center; }
    </style>
</head>
<body onload="checkLoginState()">

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="card">
        <h2 id="formTitle">🔐 Log Masuk Ahli</h2>
        <input type="text" id="memberID" placeholder="Masukkan Member ID (Contoh: KAF001)">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        
        <div id="btnContainer">
            <button class="btn" onclick="loginMember()">MASUK</button>
            <p style="text-align:center; cursor:pointer; color:blue;" onclick="tukarKeDaftar()">Belum ada akaun? Daftar di sini</p>
        </div>

        <div id="daftarContainer" style="display:none;">
            <input type="text" id="regNama" placeholder="Nama Penuh">
            <input type="text" id="regAlamat" placeholder="Alamat Penuh">
            <button class="btn" style="background:#27ae60" onclick="registerMember()">DAFTAR SEKARANG</button>
            <p style="text-align:center; cursor:pointer;" onclick="location.reload()">Kembali ke Log Masuk</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="mainContent" class="page">
        <nav style="display:flex; gap:5px; margin-bottom:20px;">
            <button class="btn" onclick="showPage('info')">Info</button>
            <button class="btn" onclick="showPage('profil')">Profil Saya</button>
            <button class="btn" style="background:#e74c3c" onclick="logoutUser()">Keluar</button>
        </nav>

        <div id="info" class="page active card">
            <h2>Manfaat Khairat</h2>
            <p>Total: RM 1,000</p>
        </div>

        <div id="profil" class="page card">
            <h2>👤 Profil Saya</h2>
            <div id="paparanData" style="padding:15px; background:#f9f9f9; border-radius:10px;">
                <p><b>Nama:</b> <span id="vNama">-</span></p>
                <p><b>Alamat:</b> <span id="vAlamat">-</span></p>
            </div>
            
            <button class="btn" style="background:#27ae60" onclick="document.getElementById('formEdit').style.display='block'">Kemaskini Profil</button>
            
            <div id="formEdit" style="display:none; margin-top:20px; border-top: 2px solid #eee; padding-top:20px;">
                <h3>Borang Kemaskini</h3>
                <input type="text" id="pAlamat" placeholder="Alamat Baru">
                <button class="btn" onclick="updateProfilSendiri()">Simpan Perubahan</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAD_xdF9IDyWoFoPFuQZv7TcOM71m-7zbA",
            authDomain: "khairat-smart-al-falah-tscc.firebaseapp.com",
            databaseURL: "https://khairat-smart-al-falah-tscc-default-rtdb.firebaseio.com",
            projectId: "khairat-smart-al-falah-tscc",
            storageBucket: "khairat-smart-al-falah-tscc.firebasestorage.app",
            messagingSenderId: "90984659311",
            appId: "1:90984659311:web:c66603de479fcaa66b509a"
        };
        firebase.initializeApp(firebaseConfig);

        function checkLoginState() {
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    paparProfil(user.uid);
                }
            });
        }

        function getFakeEmail(id) { return id.trim().toLowerCase() + "@tscc.com"; }

        function registerMember() {
            let id = document.getElementById('memberID').value;
            let email = getFakeEmail(id);
            let pass = document.getElementById('loginPass').value;

            firebase.auth().createUserWithEmailAndPassword(email, pass)
            .then((res) => {
                firebase.database().ref('ahli/' + res.user.uid).set({
                    nama: document.getElementById('regNama').value,
                    alamat: document.getElementById('regAlamat').value
                }).then(() => { alert("Pendaftaran berjaya!"); location.reload(); });
            }).catch(err => alert(err.message));
        }

        function loginMember() {
            let email = getFakeEmail(document.getElementById('memberID').value);
            let pass = document.getElementById('loginPass').value;
            firebase.auth().signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
        }

        function paparProfil(uid) {
            firebase.database().ref('ahli/' + uid).once('value', (snap) => {
                if (snap.exists()) {
                    let data = snap.val();
                    document.getElementById('vNama').innerText = data.nama || "-";
                    document.getElementById('vAlamat').innerText = data.alamat || "-";
                }
            });
        }

        function updateProfilSendiri() {
            let uid = firebase.auth().currentUser.uid;
            firebase.database().ref('ahli/' + uid).update({
                alamat: document.getElementById('pAlamat').value
            }).then(() => {
                alert("Berjaya dikemaskini!");
                location.reload();
            });
        }

        function logoutUser() { firebase.auth().signOut(); location.reload(); }
        function tukarKeDaftar() { document.getElementById('btnContainer').style.display = 'none'; document.getElementById('daftarContainer').style.display = 'block'; }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
