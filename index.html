<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginPage" class="card">
        <h2>Log Masuk Ahli</h2>
        <input type="text" id="inputId" placeholder="Masukkan ID Ahli (cth: KAF045)">
        <button onclick="cariDanMasuk()">MASUK</button>
    </div>

    <div id="mainPage" class="card" style="display:none;">
        <h2>Profil Ahli</h2>
        <p>Nama: <span id="vNama">-</span></p>
        <p>Alamat: <span id="vAlamat">-</span></p>
        <hr>
        <input type="text" id="eAlamat" placeholder="Alamat Baru">
        <button onclick="kemaskiniData()" style="background:#27ae60">SIMPAN ALAMAT</button>
        <button onclick="location.reload()" style="background:#e74c3c">KELUAR</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://khairatsmarttempat-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);

        let keyUnikAhli = ""; 

        function cariDanMasuk() {
            let idDicari = document.getElementById('inputId').value;
            
            // Mencari rekod di dalam folder 'ahli' yang mempunyai field 'id' yang sama
            firebase.database().ref('ahli').orderByChild('id').equalTo(idDicari).once('value', (s) => {
                if(s.exists()) {
                    s.forEach((childSnapshot) => {
                        keyUnikAhli = childSnapshot.key; // Simpan '1M2y7...'
                        let data = childSnapshot.val();
                        
                        document.getElementById('vNama').innerText = data.nama || '-';
                        document.getElementById('vAlamat').innerText = data.alamat || '-';
                        document.getElementById('eAlamat').value = data.alamat || '';
                        
                        document.getElementById('loginPage').style.display = 'none';
                        document.getElementById('mainPage').style.display = 'block';
                    });
                } else {
                    alert("ID tidak ditemui! Sila semak semula nombor ahli.");
                }
            });
        }

        function kemaskiniData() {
            let alamatBaru = document.getElementById('eAlamat').value;
            // Update menggunakan key unik '1M2y7...'
            firebase.database().ref('ahli/' + keyUnikAhli).update({ alamat: alamatBaru }).then(() => {
                alert("Berjaya disimpan!");
                location.reload();
            });
        }
    </script>
</body>
</html>
