<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>

    <h2>Daftar Emel Ahli</h2>
    
    <label>Masukkan ID Ahli:</label>
    <input type="text" id="inputID" placeholder="Contoh: KAF001">
    
    <button onclick="registerEmail('maillambung1443@yahoo.com')">
        Daftar Emel ke ID
    </button>

    <script>
        // 1. Konfigurasi Firebase anda
        const firebaseConfig = {
            apiKey: "AIzaSyAD_xdF9IDyWoFoPFuQZv7TcOM71m-7zbA",
            authDomain: "khairat-smart-al-falah-tscc.firebaseapp.com",
            databaseURL: "https://khairat-smart-al-falah-tscc-default-rtdb.firebaseio.com",
            projectId: "khairat-smart-al-falah-tscc",
            storageBucket: "khairat-smart-al-falah-tscc.firebasestorage.app",
            messagingSenderId: "90984659311",
            appId: "1:90984659311:web:f82d82b83b59609c6b509a",
            measurementId: "G-YZSE1KBQHD"
        };

        // 2. Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);

        // 3. Fungsi Pendaftaran
        function registerEmail(userEmail) {
            let idAhli = document.getElementById("inputID").value.trim();

            if (!idAhli) {
                alert("Sila masukkan ID ahli (contoh: KAF001)!");
                return;
            }

            // Menyimpan emel di bawah ID Ahli (contoh: ahli/KAF001/email)
            firebase.database().ref('ahli/' + idAhli).update({
                email: userEmail
            })
            .then(() => {
                alert("Emel berjaya didaftarkan untuk " + idAhli);
                location.reload();
            })
            .catch((error) => {
                console.error("Ralat Firebase: ", error);
                alert("Pendaftaran gagal: " + error.message);
            });
        }
    </script>
</body>
</html>
