<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Khairat Smart Surau Al Falah TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { font-size: 1.3rem; color: #2c3e50; text-align: center; margin-bottom: 20px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .section-box { background: #f9f9f9; padding: 15px; border-left: 5px solid #27ae60; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h1>SISTEM KHAIRAT SMART SURAU AL FALAH TSCC</h1>

    <div id="navView">
        <button onclick="tukarView('login')">LOG MASUK</button>
        <button onclick="tukarView('daftar')" style="background:#27ae60">DAFTAR AHLI BARU</button>
    </div>

    <!-- LOG MASUK -->
    <div id="loginSection" class="hidden">
        <h2>Log Masuk</h2>
        <input type="text" id="loginId" placeholder="No. Ahli">
        <button onclick="prosesLogin()">MASUK</button>
        <p style="text-align:center; cursor:pointer; color:blue;" onclick="lupaPassword()">Lupa No. Ahli/Kata Laluan?</p>
    </div>

    <!-- DAFTAR -->
    <div id="daftarSection" class="hidden">
        <h2>Pendaftaran Ahli</h2>
        <input type="text" id="regId" placeholder="No. Ahli">
        <input type="text" id="regNama" placeholder="Nama Penuh">
        <input type="tel" id="regTel" placeholder="No. Telefon">
        <button onclick="prosesDaftar()" style="background:#27ae60">HANTAR PENDAFTARAN</button>
    </div>

    <!-- PROFIL -->
    <div id="profileSection" class="hidden">
        <div id="manfaatPage">
            <div class="section-box">
                <h3>Manfaat Kematian (Jumlah: RM 1,000)</h3>
                <p>1. Pengurusan Kubur: RM 300 | 2. Kain Kafan: RM 250 | 3. Papan Lahad: RM 200 | 4. Bantuan Tunai: RM 250</p>
            </div>
            <button onclick="tukarPage('info')">LIHAT MAKLUMAT AHLI</button>
        </div>

        <div class="section-box hidden" id="infoPage">
            <h3>Maklumat Peribadi</h3>
            <p><strong>Nama:</strong> <span id="pNama"></span></p>
            <p><strong>No. Tel:</strong> <span id="pTel"></span></p>
            <button onclick="tukarPage('manfaat')">KEMBALI</button>
        </div>
        <button onclick="location.reload()" style="background:#e74c3c; margin-top:20px;">LOG KELUAR</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://khairatsmarttempat-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);

    function tukarView(v) {
        document.getElementById('navView').classList.add('hidden');
        if(v === 'login') document.getElementById('loginSection').classList.remove('hidden');
        else document.getElementById('daftarSection').classList.remove('hidden');
    }

    function tukarPage(p) {
        document.getElementById('manfaatPage').style.display = p === 'manfaat' ? 'block' : 'none';
        document.getElementById('infoPage').style.display = p === 'info' ? 'block' : 'none';
    }

    function lupaPassword() {
        alert("Sila hubungi Setiausaha, En. Ismail Bin Ishak (017-000000) untuk bantuan lanjut.");
    }

    function prosesDaftar() {
        let data = {
            id: document.getElementById('regId').value,
            nama: document.getElementById('regNama').value,
            noTel: document.getElementById('regTel').value
        };
        firebase.database().ref('ahli').push(data).then(() => {
            alert("Pendaftaran Berjaya!");
            location.reload();
        });
    }

    function prosesLogin() {
        let idDicari = document.getElementById('loginId').value;
        firebase.database().ref('ahli').orderByChild('id').equalTo(idDicari).once('value', (s) => {
            if(s.exists()) {
                let data = Object.values(s.val())[0];
                document.getElementById('pNama').innerText = data.nama;
                document.getElementById('pTel').innerText = data.noTel || 'Tiada data';
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('profileSection').classList.remove('hidden');
            } else { alert("ID tidak ditemui!"); }
        });
    }
</script>
</body>
</html>
