<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { background: #3498db; color: white; padding: 12px; border: none; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; }
        
        /* Tab System */
        .page { display: none; }
        .active { display: block; }
        .tab-btn { background: #3498db; padding: 10px; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body onload="checkLoginState()">

    <!-- LOGIN PAGE (Mengekalkan reka bentuk asal) -->
    <div id="loginPage" class="card">
        <h2 id="formTitle">Log Masuk Ahli</h2>
        <input type="email" id="loginEmail" placeholder="Emel Berdaftar">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        <div id="loginArea">
            <button class="btn" onclick="loginMember()">MASUK</button>
            <button class="btn" style="background:#e67e22;" onclick="lupaPassword()">LUPA KATA LALUAN?</button>
            <p style="text-align:center; cursor:pointer; color:blue;" onclick="tukarKeDaftar()">Belum daftar? Daftar di sini</p>
        </div>
        <div id="daftarArea" style="display:none;">
            <input type="text" id="regID" placeholder="Member ID">
            <input type="text" id="regNama" placeholder="Nama Penuh">
            <input type="email" id="regEmail" placeholder="Emel">
            <input type="password" id="regPass" placeholder="Kata Laluan">
            <input type="password" id="regPassConfirm" placeholder="Sah Kata Laluan">
            <input type="text" id="regAlamat" placeholder="Alamat">
            <input type="text" id="regTel" placeholder="No. Telefon">
            <button class="btn" style="background:#27ae60" onclick="registerMember()">DAFTAR</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD (Dengan Tab Info & Profil) -->
    <div id="mainContent" class="page">
        <nav style="display:flex; gap:5px; margin-bottom:10px;">
            <button class="tab-btn" onclick="showPage('info')">Info</button>
            <button class="tab-btn" onclick="showPage('profil')">Profil</button>
            <button class="tab-btn" style="background:#e74c3c" onclick="logoutUser()">Keluar</button>
        </nav>

        <div id="info" class="card page active">
            <h2>📋 Info Khairat</h2>
            <p>Maklumat manfaat dan pengurusan jenazah di sini.</p>
        </div>

        <div id="profil" class="card page">
            <h2>👤 Maklumat Ahli</h2>
            <p><b>Nama:</b> <span id="vNama">-</span></p>
            <div id="tanggunganInputs"></div>
            <button class="btn" onclick="updateProfile()">SIMPAN TANGGUNGAN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC_YDZfbKqgZjOBuz722XrSwOw7JPJx0u4",
            authDomain: "khairatsmarttempat.firebaseapp.com",
            projectId: "khairatsmarttempat",
            storageBucket: "khairatsmarttempat.firebasestorage.app",
            messagingSenderId: "356017221628",
            appId: "1:356017221628:web:e9a56a3fa6dd0079904c79"
        };
        firebase.initializeApp(firebaseConfig);

        // Jana input 5 tanggungan
        let tFields = "<h4>5 Tanggungan</h4>";
        for(let i=1; i<=5; i++) {
            tFields += `<input type="text" id="tNama${i}" placeholder="Nama Tanggungan ${i}">`;
        }
        document.getElementById('tanggunganInputs').innerHTML = tFields;

        function checkLoginState() {
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                }
            });
        }

        function showPage(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }

        function loginMember() { firebase.auth().signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(e => alert(e.message)); }
        function logoutUser() { firebase.auth().signOut().then(() => location.reload()); }
        function tukarKeDaftar() { document.getElementById('loginArea').style.display = 'none'; document.getElementById('daftarArea').style.display = 'block'; }
        
        function registerMember() {
            let p1 = document.getElementById('regPass').value;
            let p2 = document.getElementById('regPassConfirm').value;
            if(p1 !== p2) return alert("Kata laluan tidak sepadan!");
            firebase.auth().createUserWithEmailAndPassword(document.getElementById('regEmail').value, p1).then(() => location.reload()).catch(e => alert(e.message));
        }

        function updateProfile() {
            let uid = firebase.auth().currentUser.uid;
            let data = {};
            for(let i=1; i<=5; i++) { data['tNama'+i] = document.getElementById('tNama'+i).value; }
            firebase.database().ref('ahli/' + uid).update(data).then(() => alert("Berjaya!"));
        }
        
        function lupaPassword() { firebase.auth().sendPasswordResetEmail(document.getElementById('loginEmail').value).then(() => alert("Semak emel!")).catch(e => alert(e.message)); }
    </script>
</body>
</html>
