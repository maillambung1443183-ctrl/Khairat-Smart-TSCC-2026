<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; max-width: 400px; margin: auto; }
        .btn { background: #27ae60; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
        .hidden { display: none; }
        h2 { text-align: center; color: #2c3e50; }
    </style>
</head>
<body>

    <!-- 1. Skrin Log Masuk -->
    <div id="loginSection" class="card">
        <h2>🔑 Log Masuk</h2>
        <input type="email" id="lEmail" placeholder="Emel">
        <input type="password" id="lPass" placeholder="Kata Laluan">
        <button class="btn" onclick="loginUser()">MASUK</button>
        <p style="text-align:center; cursor:pointer;" onclick="alert('Sila hubungi Setiausaha: En Ismail Bin Ishak (0177000242)')">Lupa Kata Laluan?</p>
    </div>

    <!-- 2. Dashboard Selepas Login -->
    <div id="mainSection" class="card hidden">
        <h2>Dashboard Ahli</h2>
        <div style="background:#f9f9f9; padding:10px; border-radius:8px;">
            <p>✅ <b>Manfaat:</b> RM750 (Jenazah) + RM250 (Tunai)</p>
            <p>🏦 <b>Bayaran:</b> 9988000930222 (Surau Al Falah TSCC)</p>
        </div>
        <hr>
        <h3>Profil & Kemaskini</h3>
        <input type="text" id="uAlamat" placeholder="Alamat Penuh">
        <input type="text" id="uTel" placeholder="No Telefon">
        <input type="text" id="uWaris" placeholder="Waris Utama">
        <p><b>Tanggungan (5 orang):</b></p>
        <input type="text" class="tang" placeholder="Tanggungan 1">
        <input type="text" class="tang" placeholder="Tanggungan 2">
        <input type="text" class="tang" placeholder="Tanggungan 3">
        <input type="text" class="tang" placeholder="Tanggungan 4">
        <input type="text" class="tang" placeholder="Tanggungan 5">
        <button class="btn" onclick="updateProfil()">SIMPAN KEMASKINI</button>
        <button class="btn" style="background:#e74c3c" onclick="location.reload()">LOG KELUAR</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAD_xdF9IDyWoFoPFuQZv7TcOM71m-7zbA",
            authDomain: "khairat-smart-al-falah-tscc.firebaseapp.com",
            databaseURL: "https://khairat-smart-al-falah-tscc-default-rtdb.firebaseio.com",
            projectId: "khairat-smart-al-falah-tscc",
            storageBucket: "khairat-smart-al-falah-tscc.firebasestorage.app",
            messagingSenderId: "90984659311",
            appId: "1:90984659311:web:c66603de479fcaa66b509a",
            measurementId: "G-9LYT85X94V"
        };
        firebase.initializeApp(firebaseConfig);

        function loginUser() {
            let email = document.getElementById('lEmail').value;
            let pass = document.getElementById('lPass').value;
            firebase.auth().signInWithEmailAndPassword(email, pass)
            .then(() => {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
            })
            .catch(e => alert("Ralat: " + e.message));
        }

        function updateProfil() {
            let user = firebase.auth().currentUser;
            let tList = [];
            document.querySelectorAll('.tang').forEach(i => tList.push(i.value));
            
            if(user) {
                firebase.database().ref('ahli/' + user.uid).update({
                    alamat: document.getElementById('uAlamat').value,
                    tel: document.getElementById('uTel').value,
                    waris: document.getElementById('uWaris').value,
                    tanggungan: tList
                }).then(() => alert("Profil berjaya dikemaskini!"));
            }
        }
    </script>
</body>
</html>
