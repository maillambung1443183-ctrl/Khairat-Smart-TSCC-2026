<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="debug">
        <h2>Uji Masuk ID</h2>
        <input type="text" id="idTest" placeholder="Masukkan ID (contoh: KAF045)">
        <button onclick="testMasuk()">MASUK</button>
        <p id="hasil"></p>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://khairat-smart-al-falah-tscc-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);

        function testMasuk() {
            let id = document.getElementById('idTest').value;
            // Kita terus baca ID tersebut dari database tanpa log masuk
            firebase.database().ref(id).once('value', (s) => {
                if(s.exists()) {
                    document.getElementById('hasil').innerText = "Berjaya! Data ditemui: " + JSON.stringify(s.val());
                    console.log(s.val()); // Anda boleh lihat data dalam Inspect > Console
                } else {
                    document.getElementById('hasil').innerText = "Gagal: ID " + id + " tidak dijumpai dalam database.";
                }
            });
        }
    </script>
</body>
</html>
