<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        * { font-weight: bold !important; font-family: sans-serif; }
        .card { background: white; padding: 15px; margin: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #3498db; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; cursor: pointer; margin-top: 5px; }
        input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="app" class="card">
        <div id="loginArea">
            <input type="text" id="inputIdAhli" placeholder="Masukkan ID Ahli (cth: KAF045)">
            <button class="btn" onclick="muatData()">LOAD DATA</button>
        </div>

        <div id="paparanProfil" style="display:none;">
            <h3>Profil Ahli</h3>
            <p>Nama: <span id="vNama">-</span></p>
            <p>Alamat: <span id="vAlamat">-</span></p>
            <p>Tel: <span id="vTel">-</span></p>
            <p>Waris: <span id="vWaris">-</span></p>
            <p>Tanggungan: <span id="vTanggungan">-</span></p>
            <button class="btn" onclick="bukaEdit()">KEMASKINI</button>
        </div>

        <div id="editProfil" style="display:none;">
            <input type="text" id="eAlamat" placeholder="Alamat">
            <input type="text" id="eTel" placeholder="No Tel">
            <input type="text" id="eWaris" placeholder="Nama Waris">
            <input type="text" id="eTanggungan" placeholder="Bilangan/Nama Tanggungan">
            <button class="btn" style="background:#27ae60" onclick="simpanData()">SIMPAN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://khairat-smart-al-falah-tscc-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);

        let currentId = "";

        function muatData() {
            currentId = document.getElementById('inputIdAhli').value;
            firebase.database().ref(currentId).on('value', (s) => {
                let d = s.val() || {};
                document.getElementById('vNama').innerText = d.nama || '-';
                document.getElementById('vAlamat').innerText = d.alamat || '-';
                document.getElementById('vTel').innerText = d.tel || '-';
                document.getElementById('vWaris').innerText = d.waris || '-';
                document.getElementById('vTanggungan').innerText = d.tanggungan || '-';
                
                document.getElementById('eAlamat').value = d.alamat || '';
                document.getElementById('eTel').value = d.tel || '';
                document.getElementById('eWaris').value = d.waris || '';
                document.getElementById('eTanggungan').value = d.tanggungan || '';
                
                document.getElementById('paparanProfil').style.display = 'block';
            });
        }

        function simpanData() {
            // .update() akan simpan hanya medan yang kita tulis, data lain takkan hilang
            firebase.database().ref(currentId).update({
                alamat: document.getElementById('eAlamat').value,
                tel: document.getElementById('eTel').value,
                waris: document.getElementById('eWaris').value,
                tanggungan: document.getElementById('eTanggungan').value
            }).then(() => { alert("Berjaya disimpan!"); document.getElementById('editProfil').style.display = 'none'; });
        }

        function bukaEdit() { document.getElementById('editProfil').style.display = 'block'; }
    </script>
</body>
</html>
