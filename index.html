<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        /* Tetapan Bold untuk semua teks */
        body, html, .card, .btn, input, select, h2, p, span, b { font-weight: bold !important; font-family: sans-serif; }
        
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; background: #f4f4f9; }
        .card { background: white; padding: 15px; margin: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #3498db; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 5px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .page { display: none; }
        .active { display: block; }
        .nav-container { display: flex; gap: 5px; padding: 20px 10px 10px 10px; }
        .tab-btn { background: #3498db; padding: 10px; color: white; border: none; border-radius: 5px; cursor: pointer; flex: 1; }
    </style>
</head>
<body onload="checkLoginState()">

    <div id="loginPage" class="card">
        <h2 id="formTitle">Log Masuk Ahli</h2>
        <input type="email" id="loginEmail" placeholder="Emel Berdaftar">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        <div id="loginArea">
            <button class="btn" onclick="loginMember()">MASUK</button>
            <button class="btn" style="background:#e67e22;" onclick="lupaPassword()">LUPA KATA LALUAN?</button>
            <p style="text-align:center; cursor:pointer; color:blue;" onclick="tukarKeDaftar()">Belum daftar? Daftar di sini</p>
        </div>
        <div id="daftarArea" style="display:none;">
            <input type="text" id="regID" placeholder="Member ID">
            <input type="text" id="regNama" placeholder="Nama Penuh">
            <input type="email" id="regEmail" placeholder="Emel">
            <input type="password" id="regPass" placeholder="Kata Laluan">
            <input type="password" id="regPassConfirm" placeholder="Sah Kata Laluan">
            <input type="text" id="regAlamat" placeholder="Alamat">
            <input type="text" id="regTel" placeholder="No. Telefon">
            <button class="btn" style="background:#27ae60" onclick="registerMember()">DAFTAR</button>
        </div>
    </div>

    <div id="mainContent" class="page">
        <nav class="nav-container">
            <button class="tab-btn" onclick="showPage('info')">Info</button>
            <button class="tab-btn" onclick="showPage('profil')">Profil</button>
            <button class="tab-btn" style="background:#e74c3c" onclick="logoutUser()">Keluar</button>
        </nav>

        <div id="profil" class="card page">
            <h2>👤 Profil Ahli</h2>
            <div id="viewProfil">
                <p><b>Nama:</b> <span id="vNama">-</span></p>
                <p><b>Waris:</b> <span id="vWaris">-</span></p>
                <p><b>Tanggungan:</b> <span id="vTanggungan">-</span></p>
                <button class="btn" onclick="toggleEdit()">KEMASKINI</button>
            </div>
            <div id="editProfil" style="display:none;">
                <input type="text" id="eWaris" placeholder="Nama Waris">
                <select id="eHubunganWaris">
                    <option value="">Pilih Hubungan Waris</option>
                    <option value="Isteri">Isteri</option>
                    <option value="Suami">Suami</option>
                    <option value="Anak">Anak</option>
                    <option value="Keluarga">Keluarga</option>
                </select>
                <input type="text" id="eTelWaris" placeholder="No Tel Waris">
                <hr>
                <p><b>Tanggungan (5 Orang):</b></p>
                <div id="tanggunganContainer">
                    <script>
                        for(let i=1; i<=5; i++) {
                            document.write(`Nama ${i}: <input type="text" class="tNama" placeholder="Nama">`);
                            document.write(`Lahir ${i}: <input type="date" class="tLahir" onchange="kiraUmur(this)">`);
                            document.write(`Umur: <span class="tUmur">-</span><br>`);
                        }
                    </script>
                </div>
                <button class="btn" style="background:#27ae60" onclick="saveProfile()">SIMPAN</button>
                <button class="btn" style="background:#7f8c8d" onclick="toggleEdit()">BATAL</button>
            </div>
        </div>
    </div>

    <script>
        // Gunakan firebaseConfig asal anda di sini
        const firebaseConfig = { apiKey: "AIzaSyC_YDZfbKqgZjOBuz722XrSwOw7JPJx0u4", authDomain: "khairatsmarttempat.firebaseapp.com", projectId: "khairatsmarttempat", storageBucket: "khairatsmarttempat.firebasestorage.app", messagingSenderId: "356017221628", appId: "1:356017221628:web:e9a56a3fa6dd0079904c79" };
        firebase.initializeApp(firebaseConfig);

        function checkLoginState() { firebase.auth().onAuthStateChanged((user) => { if (user) { document.getElementById('loginPage').style.display = 'none'; document.getElementById('mainContent').style.display = 'block'; } }); }
        function kiraUmur(el) { let l = new Date(el.value); let u = new Date().getFullYear() - l.getFullYear(); el.nextElementSibling.innerText = isNaN(u) ? '-' : u; }
        function toggleEdit() { 
            let v = document.getElementById('viewProfil'); let e = document.getElementById('editProfil');
            v.style.display = (v.style.display === 'none') ? 'block' : 'none';
            e.style.display = (e.style.display === 'none') ? 'block' : 'none';
        }
        function saveProfile() {
            let uid = firebase.auth().currentUser.uid;
            let t = "";
            let names = document.querySelectorAll('.tNama');
            let ages = document.querySelectorAll('.tUmur');
            for(let i=0; i<5; i++) { if(names[i].value) t += names[i].value + " (" + ages[i].innerText + " thn), "; }
            firebase.database().ref('ahli/' + uid).update({
                waris: document.getElementById('eWaris').value,
                hubunganWaris: document.getElementById('eHubunganWaris').value,
                telWaris: document.getElementById('eTelWaris').value,
                tanggungan: t
            }).then(() => { alert("Berjaya disimpan!"); toggleEdit(); location.reload(); });
        }
        // Fungsi asal anda (login/logout/daftar) kekal di sini
        function loginMember() { firebase.auth().signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(e => alert(e.message)); }
        function logoutUser() { firebase.auth().signOut().then(() => location.reload()); }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
