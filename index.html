<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { background: #3498db; color: white; padding: 12px; border: none; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; }
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body onload="checkLoginState()">

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="card">
        <h2>Log Masuk</h2>
        <input type="email" id="loginEmail" placeholder="Emel">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        <button class="btn" onclick="loginMember()">MASUK</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="mainContent" class="page">
        <div id="profil" class="card">
            <h2>👤 Profil Ahli</h2>
            <p><b>Nama:</b> <span id="vNama">-</span></p>
            <p><b>Alamat:</b> <span id="vAlamat">-</span></p>
            <p><b>No. Tel:</b> <span id="vTel">-</span></p>
            <p><b>Alamat Waris:</b> <span id="vWarisAlamat">-</span></p>
            <p><b>Tanggungan:</b> <span id="vTanggungan">-</span></p>
            
            <button class="btn" style="background:#f39c12" onclick="toggleEdit()">KEMASKINI PROFIL</button>
            
            <div id="editForm" style="display:none; margin-top:20px; border-top:1px solid #ccc; padding-top:10px;">
                <h3>Kemaskini Maklumat</h3>
                <input type="text" id="editAlamat" placeholder="Alamat Baru">
                <input type="text" id="editTel" placeholder="No. Tel Baru">
                <input type="text" id="editWarisAlamat" placeholder="Alamat Waris Baru">
                <hr>
                <h4>Tambah Tanggungan</h4>
                <input type="text" id="tNama" placeholder="Nama Tanggungan">
                <input type="date" id="tLahir" onchange="kiraUmur()">
                <p>Umur: <span id="tUmur">0</span> tahun</p>
                <button class="btn" style="background:#27ae60" onclick="updateProfile()">SIMPAN SEMUA</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC_YDZfbKqgZjOBuz722XrSwOw7JPJx0u4",
            authDomain: "khairatsmarttempat.firebaseapp.com",
            projectId: "khairatsmarttempat",
            storageBucket: "khairatsmarttempat.firebasestorage.app",
            messagingSenderId: "356017221628",
            appId: "1:356017221628:web:e9a56a3fa6dd0079904c79",
            measurementId: "G-GQ38WMXCFG"
        };
        firebase.initializeApp(firebaseConfig);

        function checkLoginState() {
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    firebase.database().ref('ahli/' + user.uid).once('value', (s) => {
                        let d = s.val() || {};
                        document.getElementById('vNama').innerText = d.nama || "-";
                        document.getElementById('vAlamat').innerText = d.alamat || "-";
                        document.getElementById('vTel').innerText = d.tel || "-";
                        document.getElementById('vWarisAlamat').innerText = d.warisAlamat || "-";
                        document.getElementById('vTanggungan').innerText = (d.tanggunganNama || "-") + " (" + (d.tanggunganUmur || 0) + " thn)";
                    });
                }
            });
        }

        function kiraUmur() {
            let lahir = new Date(document.getElementById('tLahir').value);
            let hariIni = new Date();
            let umur = hariIni.getFullYear() - lahir.getFullYear();
            document.getElementById('tUmur').innerText = umur;
        }

        function toggleEdit() {
            let form = document.getElementById('editForm');
            form.style.display = (form.style.display === 'none') ? 'block' : 'none';
        }

        function updateProfile() {
            let uid = firebase.auth().currentUser.uid;
            firebase.database().ref('ahli/' + uid).update({
                alamat: document.getElementById('editAlamat').value,
                tel: document.getElementById('editTel').value,
                warisAlamat: document.getElementById('editWarisAlamat').value,
                tanggunganNama: document.getElementById('tNama').value,
                tanggunganUmur: document.getElementById('tUmur').innerText
            }).then(() => {
                alert("Berjaya dikemaskini!");
                location.reload();
            });
        }

        function loginMember() {
            firebase.auth().signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(e => alert(e.message));
        }
    </script>
</body>
</html>
