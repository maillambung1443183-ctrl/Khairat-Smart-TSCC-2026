<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; font-family: sans-serif; background: #f4f4f9; font-weight: bold; }
        .card { background: white; padding: 15px; margin: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; }
        .btn { background: #3498db; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-weight: bold; }
        .page { display: none; } .active { display: block; }
        .nav-container { display: flex; gap: 5px; padding: 10px; }
        .tab-btn { background: #3498db; padding: 10px; color: white; border: none; border-radius: 5px; cursor: pointer; flex: 1; font-weight: bold; }
        h2, p, b, span { font-weight: bold; }
    </style>
</head>
<body onload="checkLoginState()">

    <div id="loginPage" class="card">
        <h2><b>Log Masuk Ahli</b></h2>
        <input type="email" id="loginEmail" placeholder="Emel Berdaftar">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        <button class="btn" onclick="loginMember()">MASUK</button>
    </div>

    <div id="mainContent" class="page">
        <nav class="nav-container">
            <button class="tab-btn" onclick="showPage('info')">Info</button>
            <button class="tab-btn" onclick="showPage('profil')">Profil</button>
            <button class="tab-btn" style="background:#e74c3c" onclick="location.reload()">Keluar</button>
        </nav>

        <div id="profil" class="card page active">
            <h2><b>👤 Profil Ahli</b></h2>
            <div id="viewProfil">
                <p><b>Nama:</b> <span id="vNama">-</span></p>
                <p><b>Waris:</b> <span id="vWaris">-</span></p>
                <p><b>Tanggungan:</b><br><span id="vTanggungan">-</span></p>
                <button class="btn" onclick="toggleEdit()">KEMASKINI</button>
            </div>
            <div id="editProfil" style="display:none;">
                <input type="text" id="eWaris" placeholder="Nama Waris">
                <select id="eHubunganWaris"><option value="">Pilih Hubungan</option><option value="Isteri">Isteri</option><option value="Suami">Suami</option><option value="Anak">Anak</option></select>
                <div id="tanggunganFields">
                    <!-- 5 Set Input Tanggungan -->
                    <script>
                        for(let i=1; i<=5; i++) {
                            document.write(`<input type="text" class="tNama" placeholder="Nama Tanggungan ${i}">`);
                            document.write(`<input type="date" class="tLahir" onchange="hitungUmur(this)">`);
                            document.write(`<p>Umur: <span class="tUmur">-</span></p>`);
                        }
                    </script>
                </div>
                <button class="btn" style="background:#27ae60" onclick="saveProfile()">SIMPAN</button>
                <button class="btn" style="background:#7f8c8d" onclick="toggleEdit()">BATAL</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://khairatsmarttempat.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);

        function checkLoginState() { firebase.auth().onAuthStateChanged((user) => { if(user) { document.getElementById('loginPage').style.display = 'none'; document.getElementById('mainContent').style.display = 'block'; loadData(user.uid); } }); }

        function hitungUmur(el) {
            let birthDate = new Date(el.value);
            let age = new Date().getFullYear() - birthDate.getFullYear();
            el.nextElementSibling.querySelector('span').innerText = isNaN(age) ? '-' : age;
        }

        function loadData(uid) {
            firebase.database().ref('ahli/' + uid).on('value', (s) => {
                let d = s.val() || {};
                document.getElementById('vNama').innerText = d.nama || '-';
                document.getElementById('vWaris').innerText = (d.waris || '-') + " (" + (d.hubunganWaris || "-") + ")";
                document.getElementById('vTanggungan').innerHTML = d.listTanggungan || '-';
            });
        }

        function saveProfile() {
            let uid = firebase.auth().currentUser.uid;
            let list = "";
            let names = document.querySelectorAll('.tNama');
            let dates = document.querySelectorAll('.tLahir');
            for(let i=0; i<5; i++) {
                if(names[i].value) list += `${names[i].value} (${dates[i].value}), `;
            }
            firebase.database().ref('ahli/' + uid).update({
                waris: document.getElementById('eWaris').value,
                hubunganWaris: document.getElementById('eHubunganWaris').value,
                listTanggungan: list
            }).then(() => { alert("Berjaya disimpan!"); toggleEdit(); });
        }

        function toggleEdit() {
            document.getElementById('viewProfil').style.display = document.getElementById('viewProfil').style.display === 'none' ? 'block' : 'none';
            document.getElementById('editProfil').style.display = document.getElementById('editProfil').style.display === 'none' ? 'block' : 'none';
        }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function loginMember() { firebase.auth().signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(e => alert(e.message)); }
    </script>
</body>
</html>
