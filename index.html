<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Khairat Smart TSCC</title>
    <!-- Firebase SDK v9 Compatibility -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>

    <h2>Pendaftaran Emel Ahli</h2>
    
    <!-- Ruangan Input ID -->
    <label>Masukkan ID Ahli:</label><br>
    <input type="text" id="inputID" placeholder="Contoh: KAF001">
    <br><br>

    <!-- Ruangan Input Emel (Pengguna taip sendiri) -->
    <label>Masukkan Emel Anda:</label><br>
    <input type="email" id="inputEmail" placeholder="contoh@email.com">
    <br><br>
    
    <!-- Butang Pendaftaran -->
    <button onclick="registerData()">Daftar Sekarang</button>

    <script>
        // 1. Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAD_xdF9IDyWoFoPFuQZv7TcOM71m-7zbA",
            authDomain: "khairat-smart-al-falah-tscc.firebaseapp.com",
            databaseURL: "https://khairat-smart-al-falah-tscc-default-rtdb.firebaseio.com",
            projectId: "khairat-smart-al-falah-tscc",
            storageBucket: "khairat-smart-al-falah-tscc.firebasestorage.app",
            messagingSenderId: "90984659311",
            appId: "1:90984659311:web:f82d82b83b59609c6b509a",
            measurementId: "G-YZSE1KBQHD"
        };

        // 2. Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);

        // 3. Fungsi Pendaftaran yang mengambil input daripada pengguna
        function registerData() {
            // Mengambil nilai dari kotak input HTML
            let idAhli = document.getElementById("inputID").value.trim();
            let emailUser = document.getElementById("inputEmail").value.trim();

            // Validasi: Pastikan tiada kotak yang kosong
            if (!idAhli || !emailUser) {
                alert("Sila isi kedua-dua ID dan Emel!");
                return;
            }

            // Menyimpan ke Firebase di bawah folder 'ahli'
            firebase.database().ref('ahli/' + idAhli).update({
                email: emailUser
            })
            .then(() => {
                alert("Berjaya! Emel " + emailUser + " telah didaftarkan untuk ID " + idAhli);
                location.reload(); // Segarkan halaman
            })
            .catch((error) => {
                console.error("Ralat Firebase: ", error);
                alert("Pendaftaran gagal: " + error.message);
            });
        }
    </script>
</body>
</html>
