<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { background: #3498db; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body onload="checkLoginState()">

    <!-- LOGIN/DAFTAR PAGE -->
    <div id="loginPage" class="card">
        <h2 id="formTitle">Log Masuk Ahli</h2>
        <input type="text" id="memberID" placeholder="Member ID (Contoh: KAF000)">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        
        <div id="loginArea">
            <button class="btn" onclick="loginMember()">MASUK</button>
            <p style="text-align:center; cursor:pointer; color:blue;" onclick="tukarKeDaftar()">Belum daftar? Klik di sini</p>
        </div>

        <div id="daftarArea" style="display:none;">
            <input type="text" id="regNama" placeholder="Nama Penuh">
            <input type="text" id="regAlamat" placeholder="Alamat">
            <button class="btn" style="background:#27ae60" onclick="registerMember()">DAFTAR</button>
            <p style="text-align:center; cursor:pointer;" onclick="location.reload()">Kembali ke Log Masuk</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="mainContent" class="page">
        <button class="btn" style="background:#e74c3c" onclick="logoutUser()">KELUAR</button>
        <div id="profil" class="card active">
            <h2>Profil Saya</h2>
            <p><b>Nama:</b> <span id="vNama">-</span></p>
            <p><b>Alamat:</b> <span id="vAlamat">-</span></p>
            
            <button class="btn" onclick="document.getElementById('formEdit').style.display='block'">Kemaskini Alamat</button>
            
            <div id="formEdit" style="display:none; margin-top:15px;">
                <input type="text" id="pAlamat" placeholder="Alamat Baru">
                <button class="btn" style="background:#27ae60" onclick="updateProfil()">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIG LENGKAP ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyAD_xdF9IDyWoFoPFuQZv7TcOM71m-7zbA",
            authDomain: "khairat-smart-al-falah-tscc.firebaseapp.com",
            databaseURL: "https://khairat-smart-al-falah-tscc-default-rtdb.firebaseio.com",
            projectId: "khairat-smart-al-falah-tscc",
            storageBucket: "khairat-smart-al-falah-tscc.firebasestorage.app",
            messagingSenderId: "90984659311",
            appId: "1:90984659311:web:c66603de479fcaa66b509a",
            measurementId: "G-9LYT85X94V"
        };
        firebase.initializeApp(firebaseConfig);

        function checkLoginState() {
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    firebase.database().ref('ahli/' + user.uid).once('value', (snap) => {
                        let data = snap.val();
                        if(data) {
                            document.getElementById('vNama').innerText = data.nama;
                            document.getElementById('vAlamat').innerText = data.alamat;
                        }
                    });
                }
            });
        }

        function registerMember() {
            let id = document.getElementById('memberID').value;
            let email = id.toLowerCase() + "@tscc.com";
            let pass = document.getElementById('loginPass').value;
            firebase.auth().createUserWithEmailAndPassword(email, pass)
            .then((res) => {
                firebase.database().ref('ahli/' + res.user.uid).set({
                    nama: document.getElementById('regNama').value,
                    alamat: document.getElementById('regAlamat').value
                }).then(() => location.reload());
            }).catch(e => alert(e.message));
        }

        function loginMember() {
            let email = document.getElementById('memberID').value.toLowerCase() + "@tscc.com";
            let pass = document.getElementById('loginPass').value;
            firebase.auth().signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        }

        function updateProfil() {
            let uid = firebase.auth().currentUser.uid;
            firebase.database().ref('ahli/' + uid).update({
                alamat: document.getElementById('pAlamat').value
            }).then(() => location.reload());
        }

        function logoutUser() { firebase.auth().signOut().then(() => location.reload()); }
        function tukarKeDaftar() {
            document.getElementById('formTitle').innerText = "Daftar Ahli Baru";
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('daftarArea').style.display = 'block';
        }
    </script>
</body>
</html>
