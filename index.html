<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Khairat Smart TSCC - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .page { display: none; }
        .active { display: block; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body onload="checkLoginState()">

<div id="authPage" class="card">
    <h2>Log Masuk</h2>
    <input type="email" id="email" placeholder="Emel">
    <input type="password" id="pass" placeholder="Kata Laluan">
    <button onclick="login()">LOG MASUK</button>
</div>

<div id="mainPage" class="page">
    <div class="card">
        <h2>Dashboard Ahli</h2>
        <button onclick="show('profil')">Profil & Tanggungan</button>
        <button onclick="logout()" style="background:#e74c3c">KELUAR</button>
    </div>

    <div id="profil" class="card page">
        <h3>Profil Anda</h3>
        <div id="profilData">Memuatkan data...</div>
        <hr>
        <h4>Kemaskini Tanggungan</h4>
        <div id="tanggunganFields"></div>
        <button onclick="saveProfile()">SIMPAN</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC_YDZfbKqgZjOBuz722XrSwOw7JPJx0u4",
        authDomain: "khairatsmarttempat.firebaseapp.com",
        projectId: "khairatsmarttempat",
        storageBucket: "khairatsmarttempat.firebasestorage.app",
        messagingSenderId: "356017221628",
        appId: "1:356017221628:web:e9a56a3fa6dd0079904c79"
    };
    firebase.initializeApp(firebaseConfig);

    // Jana input tanggungan 5 orang
    let tFields = "";
    for(let i=1; i<=5; i++) {
        tFields += `<div><input type="text" id="nama${i}" placeholder="Nama Tanggungan ${i}">
                    <input type="date" id="tgl${i}"></div>`;
    }
    document.getElementById('tanggunganFields').innerHTML = tFields;

    function checkLoginState() {
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authPage').style.display = 'none';
                document.getElementById('mainPage').style.display = 'block';
                loadData(user.uid);
            }
        });
    }

    function loadData(uid) {
        firebase.database().ref('ahli/' + uid).on('value', s => {
            let d = s.val();
            if(d) {
                document.getElementById('profilData').innerHTML = `Nama: ${d.nama||'Tiada'}`;
            } else {
                document.getElementById('profilData').innerHTML = "Tiada data dijumpai.";
            }
        });
    }

    function saveProfile() {
        let uid = firebase.auth().currentUser.uid;
        let data = {};
        for(let i=1; i<=5; i++) {
            data['nama'+i] = document.getElementById('nama'+i).value;
        }
        firebase.database().ref('ahli/' + uid).update(data).then(() => alert("Berjaya!"));
    }

    function login() {
        let e = document.getElementById('email').value;
        let p = document.getElementById('pass').value;
        firebase.auth().signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
    }
    
    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
    
    function logout() { firebase.auth().signOut().then(() => location.reload()); }
</script>
</body>
</html>
