<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Khairat Smart TSCC</title>
    <!-- Pastikan link library Firebase anda kekal sama seperti asal -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        /* Mengekalkan gaya asal anda dan menambah arahan bold untuk semua teks */
        body { font-weight: bold; }
        .card, .btn, input, select, h2, p, span, b { font-weight: bold !important; }
        
        /* Gaya asal sistem anda */
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; font-family: sans-serif; background: #f4f4f9; }
        .card { background: white; padding: 15px; margin: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #3498db; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .page { display: none; }
        .active { display: block; }
        .nav-container { display: flex; gap: 5px; padding: 20px 10px 10px 10px; }
        .tab-btn { background: #3498db; padding: 10px; color: white; border: none; border-radius: 5px; cursor: pointer; flex: 1; }
    </style>
</head>
<body onload="checkLoginState()">

    <!-- Bahagian Log Masuk Asal Anda -->
    <div id="loginPage" class="card">
        <h2>Log Masuk Ahli</h2>
        <input type="email" id="loginEmail" placeholder="Emel Berdaftar">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        <button class="btn" onclick="loginMember()">MASUK</button>
    </div>

    <div id="mainContent" class="page">
        <!-- Navigasi Asal -->
        <nav class="nav-container">
            <button class="tab-btn" onclick="showPage('info')">Info</button>
            <button class="tab-btn" onclick="showPage('profil')">Profil</button>
            <button class="tab-btn" style="background:#e74c3c" onclick="logoutUser()">Keluar</button>
        </nav>

        <div id="profil" class="card page">
            <h2>👤 Profil Ahli</h2>
            <div id="viewProfil">
                <p><b>Nama:</b> <span id="vNama">-</span></p>
                <p><b>Tanggungan:</b> <span id="vTanggungan">-</span></p>
                <button class="btn" onclick="toggleEdit()">KEMASKINI</button>
            </div>
            
            <div id="editProfil" style="display:none;">
                <!-- Input Tanggungan (5 Set) -->
                <div id="tanggunganInputArea">
                    <p>Masukkan 5 Nama Tanggungan & Tarikh Lahir:</p>
                    <script>
                        for(let i=1; i<=5; i++) {
                            document.write(`Nama ${i}: <input type="text" class="eTNama" placeholder="Nama">`);
                            document.write(`Lahir ${i}: <input type="date" class="eTLahir" onchange="kiraUmur(this)">`);
                            document.write(`Umur: <span class="vUmur">-</span><br>`);
                        }
                    </script>
                </div>
                <button class="btn" style="background:#27ae60" onclick="saveProfile()">SIMPAN</button>
                <button class="btn" style="background:#7f8c8d" onclick="toggleEdit()">BATAL</button>
            </div>
        </div>
    </div>

    <script>
        // Fungsi Kira Umur Auto
        function kiraUmur(el) {
            let lahir = new Date(el.value);
            let skrg = new Date();
            let umur = skrg.getFullYear() - lahir.getFullYear();
            el.nextElementSibling.innerText = isNaN(umur) ? '-' : umur;
        }

        // Fungsi Simpan (Menambah/Update tanpa hilang data lama)
        function saveProfile() {
            let uid = firebase.auth().currentUser.uid;
            let listTanggungan = [];
            let n = document.querySelectorAll('.eTNama');
            let l = document.querySelectorAll('.eTLahir');
            
            for(let i=0; i<5; i++) {
                if(n[i].value) listTanggungan.push(n[i].value + " (Umur: " + (new Date().getFullYear() - new Date(l[i].value).getFullYear()) + ")");
            }

            firebase.database().ref('ahli/' + uid).update({
                tanggungan: listTanggungan.join(", ")
            }).then(() => { alert("Berjaya disimpan!"); toggleEdit(); });
        }

        // Fungsi asal anda... (Sila kekalkan fungsi asal login/logout anda di sini)
    </script>
</body>
</html>
