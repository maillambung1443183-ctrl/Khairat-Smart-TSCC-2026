<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Khairat Smart TSCC</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; font-family: sans-serif; background: #f4f4f9; font-weight: bold; }
        .card { background: white; padding: 15px; margin: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #3498db; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 5px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }
        .nav-container { display: flex; gap: 5px; padding: 20px 10px 10px 10px; }
        .tab-btn { background: #3498db; padding: 10px; color: white; border: none; border-radius: 5px; cursor: pointer; flex: 1; }
    </style>
</head>
<body onload="checkLoginState()">

    <div id="loginPage" class="card">
        <h2>Log Masuk Ahli</h2>
        <input type="email" id="loginEmail" placeholder="Emel Berdaftar">
        <input type="password" id="loginPass" placeholder="Kata Laluan">
        <button class="btn" onclick="loginMember()">MASUK</button>
    </div>

    <div id="mainContent" class="page">
        <nav class="nav-container">
            <button class="tab-btn" onclick="showPage('info')">Info</button>
            <button class="tab-btn" onclick="showPage('profil')">Profil</button>
            <button class="tab-btn" style="background:#e74c3c" onclick="logoutUser()">Keluar</button>
        </nav>

        <div id="info" class="card page active">
            <h2>📋 Info Khairat</h2>
            <p>Jumlah Manfaat: RM1000</p>
        </div>

        <div id="profil" class="card page">
            <h2>👤 Profil Ahli</h2>
            <div id="viewProfil">
                <p>Nama: <span id="vNama">-</span></p>
                <p>Alamat: <span id="vAlamat">-</span></p>
                <p>No Tel: <span id="vTel">-</span></p>
                <p>Waris: <span id="vWaris">-</span></p>
                <p>Tanggungan: <span id="vTanggungan">-</span></p>
                <button class="btn" onclick="toggleEdit()">KEMASKINI</button>
            </div>
            <div id="editProfil" style="display:none;">
                <input type="text" id="eAlamat" placeholder="Alamat Baru">
                <input type="text" id="eTel" placeholder="No Tel Baru">
                <input type="text" id="eWaris" placeholder="Nama Waris">
                <select id="eHubunganWaris"><option value="">Pilih Hubungan</option><option value="Isteri">Isteri</option><option value="Suami">Suami</option><option value="Anak">Anak</option></select>
                <input type="text" id="eTelWaris" placeholder="No Tel Waris">
                <div id="tanggunganFields">
                    <input type="text" class="tNama" placeholder="Nama 1"> <input type="date" class="tLahir">
                    <input type="text" class="tNama" placeholder="Nama 2"> <input type="date" class="tLahir">
                    <input type="text" class="tNama" placeholder="Nama 3"> <input type="date" class="tLahir">
                    <input type="text" class="tNama" placeholder="Nama 4"> <input type="date" class="tLahir">
                    <input type="text" class="tNama" placeholder="Nama 5"> <input type="date" class="tLahir">
                </div>
                <button class="btn" style="background:#27ae60" onclick="saveProfile()">SIMPAN</button>
                <button class="btn" style="background:#7f8c8d" onclick="toggleEdit()">BATAL</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC_YDZfbKqgZjOBuz722XrSwOw7JPJx0u4", authDomain: "khairatsmarttempat.firebaseapp.com", projectId: "khairatsmarttempat", storageBucket: "khairatsmarttempat.firebasestorage.app", messagingSenderId: "356017221628", appId: "1:356017221628:web:e9a56a3fa6dd0079904c79" };
        firebase.initializeApp(firebaseConfig);

        function checkLoginState() { firebase.auth().onAuthStateChanged((user) => { if (user) { document.getElementById('loginPage').style.display = 'none'; document.getElementById('mainContent').style.display = 'block'; loadData(user.uid); } }); }

        function loadData(uid) {
            firebase.database().ref('ahli/' + uid).on('value', (s) => {
                let d = s.val() || {};
                document.getElementById('vNama').innerText = d.nama || '-';
                document.getElementById('vAlamat').innerText = d.alamat || '-';
                document.getElementById('vTel').innerText = d.tel || '-';
                document.getElementById('vWaris').innerText = d.waris || '-';
                document.getElementById('vTanggungan').innerText = d.tanggungan || '-';
            });
        }

        function toggleEdit() {
            let v = document.getElementById('viewProfil');
            let e = document.getElementById('editProfil');
            if (e.style.display === 'none') {
                firebase.database().ref('ahli/' + firebase.auth().currentUser.uid).once('value', (s) => {
                    let d = s.val() || {};
                    document.getElementById('eAlamat').value = d.alamat || '';
                    document.getElementById('eTel').value = d.tel || '';
                    document.getElementById('eWaris').value = d.waris || '';
                });
                v.style.display = 'none'; e.style.display = 'block';
            } else { v.style.display = 'block'; e.style.display = 'none'; }
        }

        function saveProfile() {
            let uid = firebase.auth().currentUser.uid;
            let namaInputs = document.getElementsByClassName('tNama');
            let count = 0;
            for(let i = 0; i < namaInputs.length; i++) { if(namaInputs[i].value !== "") count++; }
            
            // Menggunakan .update() untuk memastikan data lain (nama, email, dll) tidak terpadam
            firebase.database().ref('ahli/' + uid).update({
                alamat: document.getElementById('eAlamat').value,
                tel: document.getElementById('eTel').value,
                waris: document.getElementById('eWaris').value,
                tanggungan: count.toString()
            }).then(() => { alert("Berjaya dikemaskini!"); toggleEdit(); });
        }

        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function loginMember() { firebase.auth().signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(e => alert(e.message)); }
        function logoutUser() { firebase.auth().signOut().then(() => location.reload()); }
    </script>
</body>
</html>
