<!DOCTYPE html>
<html>
<head>
    <title>Penyiasat Database</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>
    <h3>Mencari Struktur Data... Sila tunggu sebentar.</h3>
    <pre id="output"></pre>

    <script>
        const firebaseConfig = {
            databaseURL: "https://khairatsmarttempat-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);

        // Membaca punca (root) database
        firebase.database().ref('/').once('value', (s) => {
            document.getElementById('output').innerText = JSON.stringify(s.val(), null, 2);
        }).catch((e) => {
            document.getElementById('output').innerText = "Ralat: " + e.message;
        });
    </script>
</body>
</html>
