<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Log Masuk Ahli</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        h2 { color: #2c3e50; }
        a { color: #3498db; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Log Masuk Ahli</h2>
    <p>Sila masukkan No. Ahli anda</p>
    <input type="text" id="loginId" placeholder="No. Ahli (cth: KAF000)">
    <button onclick="prosesLogin()">LOG MASUK</button>
    <br><br>
    <a href="daftar.html">Belum daftar? Klik di sini</a>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://khairatsmarttempat-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);

    function prosesLogin() {
        let idDicari = document.getElementById('loginId').value;
        
        firebase.database().ref('ahli').orderByChild('id').equalTo(idDicari).once('value', (s) => {
            if(s.exists()) {
                alert("Log Masuk Berjaya! Selamat datang.");
                // Boleh tambah kod untuk terus ke halaman profil di sini
            } else {
                alert("ID tidak ditemui! Sila semak semula.");
            }
        });
    }
</script>
</body>
</html>
